name: PR Tests

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Pushover notification
        if: always()
        uses: umahmood/pushover-actions@main
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          status: ${{ job.status }}
          title: ${{ job.status == 'success' && '✅ LlmByok PR 測試通過' || '❌ LlmByok PR 測試失敗' }}
          message: |
            PR #${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}
            分支: ${{ github.head_ref }} → ${{ github.base_ref }}
            狀態: ${{ job.status }}
          priority: ${{ job.status == 'success' && '0' || '1' }}
          sound: ${{ job.status == 'success' && 'pushover' || 'falling' }}
          url: '${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          url_title: '查看 PR'